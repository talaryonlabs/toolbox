on: [push]
jobs:
  build-and-pack:
    runs-on: dotnet
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION=${GITHUB_REF#refs/tags/}
            VERSION=${VERSION#v}
            IS_TAG=true
            # Check if tag's commit is on main branch
            if git branch --contains ${GITHUB_SHA} | grep -q "main"; then
              IS_MAIN=true
            fi
          else
            LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "1.0.0")
            BRANCH=${GITHUB_REF#refs/heads/}
            VERSION="${LATEST_TAG#v}-ci.${GITHUB_SHA:0:8}"
            if [ "$BRANCH" != "main" ]; then
              VERSION="${VERSION}-${BRANCH}"
            else
              IS_MAIN=true
            fi
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "IS_TAG=$IS_TAG" >> $GITHUB_ENV
          echo "IS_MAIN=$IS_MAIN" >> $GITHUB_ENV

      - name: Add NuGet source
        run: |
          dotnet nuget add source --name nuget.pkg.talaryon.dev https://nuget.pkg.talaryon.dev/v3/index.json
          dotnet nuget add source --name code.talaryon.dev https://code.talaryon.dev/api/packages/${{ forgejo.repository_owner }}/nuget/index.json

      - name: Build NuGet package
        run: dotnet pack src/Toolbox.Hosting/Toolbox.Hosting.csproj -c Release -o ./artifacts/hosting -p:Version=${{ env.VERSION }}

      - name: Push NuGet package to code.talaryon.dev
        run: dotnet nuget push ./artifacts/hosting/Talaryon.Toolbox.Hosting.${{ env.VERSION }}.nupkg -s code.talaryon.dev -k ${{ secrets.PACKAGE_APIKEY }}

      - name: Push NuGet package to nuget.pkg.talaryon.dev
        if: env.IS_TAG == 'true' && env.IS_MAIN == 'true'
        run: dotnet nuget push ./artifacts/hosting/Talaryon.Toolbox.Hosting.${{ env.VERSION }}.nupkg -s nuget.pkg.talaryon.dev -k ${{ secrets.NUGET_APIKEY }}
